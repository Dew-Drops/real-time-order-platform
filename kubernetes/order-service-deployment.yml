apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 3   # 👈 THIS IS THE MAGIC
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: default
